<article class="publication-card">
  <div class="publication-card__content">

    <p class="publication-card__meta">
      {{ post.venue }} · {{ post.date | date: "%Y" }}
    </p>

    <h2 class="publication-card__title">
      <a href="{{ post.url | relative_url }}">
        {{ post.title }}
      </a>
    </h2>

    {% if post.summary %}
      <p class="publication-card__summary">
        {{ post.summary }}
      </p>
    {% elsif post.excerpt %}
      <div class="publication-card__summary">
        {{ post.excerpt | strip_html | truncatewords: 32 }}
      </div>
    {% endif %}

    <div class="publication-card__links">
      <a href="{{ post.url | relative_url }}">Details</a>

      {% if post.paperurl %}
        <a href="{{ post.paperurl }}" target="_blank" rel="noopener">
          Paper
        </a>
      {% endif %}
    </div>

  </div>
</article>
